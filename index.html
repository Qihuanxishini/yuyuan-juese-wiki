<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="wiki-depth" content="0">
  <title>花仙子 Wiki</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <nav id="main-nav"></nav>

  <!-- 人物展示区 -->
  <div class="hero-section">
    <img class="hero-portrait" src="assets/img/character.png" alt="万圆"
         onerror="this.onerror=null;this.src='assets/img/unknown.png'">
    <div class="hero-name">绾缘</div>
    <div class="hero-subtitle">花仙子</div>

    <div class="hero-stats">
      <div class="hero-stat">
        <span class="hstat-label">生命</span>
        <span class="hstat-value">200</span>
      </div>
      <div class="hero-stat">
        <span class="hstat-label">饱食度</span>
        <span class="hstat-value">150</span>
      </div>
      <div class="hero-stat">
        <span class="hstat-label">精神</span>
        <span class="hstat-value">175</span>
      </div>
    </div>

    <div class="hero-traits">
      <div class="hero-trait">✦ 潮湿时持续回复生命与精神</div>
      <div class="hero-trait">✦ 自动照料附近植物，并伴随植物系特效</div>
      <div class="hero-trait">✦ 喜欢太妃糖，拥有专属配方与额外掉落能力</div>
    </div>

  </div>

  <!-- 分类导航 -->
  <div class="container">
    <div class="section-title">内容图鉴</div>
    <div class="category-cards">
      <a class="category-card" href="items/index.html">
        <div class="card-label">道具</div>
      </a>
      <a class="category-card" href="food/index.html">
        <div class="card-label">食物</div>
      </a>
      <a class="category-card" href="plants/index.html">
        <div class="card-label">植物</div>
      </a>
      <a class="category-card" href="materials/index.html">
        <div class="card-label">其他</div>
      </a>
    </div>
    <div class="home-footer">
      <p>花仙子模组 &middot; 万圆团队</p>
    </div>
  </div>

  <script src="assets/js/common.js"></script>
</body>
</html>
